<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Snake Game - Eldritch Tentacle Horror</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background-color: #0a0a14;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100%;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #4a9e4a;
            margin-bottom: 0.5rem;
            font-size: clamp(0.9rem, 3vw, 1.5rem);
        }
        #game-container {
            width: min(640px, 95vw, calc(95vh * 4 / 3 - 4rem));
            aspect-ratio: 4 / 3;
            border: 2px solid #2a4a2a;
            box-shadow: 0 0 20px rgba(0, 100, 0, 0.3);
            touch-action: none;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
        }
        .controls {
            margin-top: 0.5rem;
            font-size: clamp(0.65rem, 2vw, 0.85rem);
            color: #808080;
            text-align: center;
        }
        .controls kbd {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: inherit;
        }
        .controls .mobile-hint {
            display: none;
        }
        #loading {
            color: #4a9e4a;
            font-size: 1.2rem;
        }

        /* モバイル: スワイプ操作のヒントを表示 */
        @media (pointer: coarse) {
            .controls .desktop-hint { display: none; }
            .controls .mobile-hint { display: inline; }
        }
    </style>
</head>
<body>
    <h1>Snake Game - Eldritch Tentacle Horror</h1>
    <div id="game-container">
        <p id="loading">Loading...</p>
    </div>
    <div class="controls">
        <span class="desktop-hint">
            <kbd>Arrow Keys</kbd> Move &nbsp;
            <kbd>Space</kbd> Pause &nbsp;
            <kbd>Enter</kbd> Restart
        </span>
        <span class="mobile-hint">
            Swipe to move &bull; Tap to restart
        </span>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        // タッチでのスクロール・ズームを完全に無効化
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject).then((result) => {
            document.getElementById("loading").remove();
            go.run(result.instance);
        }).catch((err) => {
            document.getElementById("loading").textContent = "Failed to load: " + err;
        });
    </script>
</body>
</html>
